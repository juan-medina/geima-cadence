name: Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Testers only ever care about the newest build, so supersede any in flight.
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        name: Build and deploy
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            -   name: Checkout game
                uses: actions/checkout@v4

            -   name: Checkout data
                uses: actions/checkout@v4
                with:
                    repository: juan-medina/geima-cadence-data
                    ssh-key: ${{ secrets.DATA_REPO_KEY }}
                    lfs: true
                    path: data

            # src/assets is a junction locally and is not tracked here, so the
            # runner has to recreate it before Godot can resolve res://assets.
            -   name: Link assets
                run: ln -s "$GITHUB_WORKSPACE/data/assets" src/assets

            # An unfetched LFS file imports as a 130 byte text file and ships a
            # silently broken build, so fail here instead.
            -   name: Verify assets
                run: |
                    if grep -rl "^version https://git-lfs" data/assets/ 2>/dev/null | grep -q .; then
                        echo "::error::LFS objects were not fetched"
                        exit 1
                    fi

            -   name: Stamp build info
                run: python3 scripts/gen_build_info.py

            -   name: Setup Godot
                uses: chickensoft-games/setup-godot@v2
                with:
                    version: 4.7.1
                    use-dotnet: false
                    include-templates: true
                    cache: true

            -   name: Import project assets
                working-directory: src
                env:
                    GODOT_DISABLE_LEAK_CHECKS: 1
                run: godot --headless --import

            -   name: Export web
                working-directory: src
                run: |
                    mkdir -p ../bin/web
                    godot --headless --export-release "Web" ../bin/web/index.html

            -   name: Upload Pages artifact
                uses: actions/upload-pages-artifact@v3
                with:
                    path: bin/web

            -   name: Deploy to Pages
                id: deployment
                uses: actions/deploy-pages@v4
